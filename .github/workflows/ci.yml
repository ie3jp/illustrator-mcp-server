name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        node-version: [20, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test

  release:
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: 'https://registry.npmjs.org'
      - run: npm install -g npm@latest

      # Update server.json version from tag
      - name: Update server.json version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/g" server.json

      # npm publish (OIDC trusted publishing)
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm publish --provenance --access public

      # GitHub Release with .mcpb
      - run: npm ci --omit=dev
      - run: npx @anthropic-ai/mcpb pack
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: '*.mcpb'
          generate_release_notes: true

      # MCP Registry publish
      - name: Install mcp-publisher
        run: |
          curl -sL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" | tar xz mcp-publisher
          sudo mv mcp-publisher /usr/local/bin/
      - name: Publish to MCP Registry
        run: |
          mcp-publisher login github-oidc
          mcp-publisher publish
