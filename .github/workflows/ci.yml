name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    permissions:
      contents: read
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [20, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test

  release:
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: 'https://registry.npmjs.org'
      - run: npm install -g npm@latest

      # Update server.json version from tag
      - name: Update server.json version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="$VERSION" node -e "const fs=require('fs'); const p='server.json'; const d=JSON.parse(fs.readFileSync(p,'utf8')); d.version=process.env.VERSION; fs.writeFileSync(p, JSON.stringify(d, null, 2)+'\\n');"

      # npm publish (OIDC trusted publishing)
      - run: npm ci
      - run: npm run build
      - run: npm test
      - name: Publish to npm
        run: npm publish --provenance --access public

      # GitHub Release with .mcpb
      - run: npm ci --omit=dev
      - run: npx @anthropic-ai/mcpb pack
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: '*.mcpb'
          body_path: RELEASE_NOTES.md
          generate_release_notes: true

      # MCP Registry publish
      - name: Install mcp-publisher
        env:
          MCP_PUBLISHER_VERSION: v1.5.0
          MCP_PUBLISHER_SHA256: 79bbb73ba048c5906034f73ef6286d7763bd53cf368ea0b358fc593ed360cbd5
        run: |
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/download/${MCP_PUBLISHER_VERSION}/mcp-publisher_linux_amd64.tar.gz" -o mcp-publisher_linux_amd64.tar.gz
          echo "${MCP_PUBLISHER_SHA256}  mcp-publisher_linux_amd64.tar.gz" | sha256sum -c -
          tar xzf mcp-publisher_linux_amd64.tar.gz mcp-publisher
          sudo mv mcp-publisher /usr/local/bin/
      - name: Publish to MCP Registry
        run: |
          mcp-publisher login github-oidc
          mcp-publisher publish
